# Market variables — Yahoo Finance and (later) Interactive Brokers tickers.
#
# Schema per entry:
#   <NAME>:
#     domain: market
#     layer: raw
#     source: yahoo | ib
#     ticker: <vendor ticker>
#     description: <one-line human description>
#     frequency: daily
#     instrument_type: etf | fx_spot | equity | index
#     adjustment: auto_adjust | none
#
# Note on equity universes: the current S&P 500 list is survivorship-biased.
# The universe definition lives in `configs/universes/sp500_current.yaml` and
# is referenced by signals that need cross-sectional equity exposure. This file
# only declares the rate ETFs and FX pairs that are explicitly named variables.

# Rate ETFs (used for Rates Trend signal and proxies).
TLT_CLOSE:
  domain: market
  layer: raw
  source: yahoo
  ticker: TLT
  description: iShares 20+ Year Treasury Bond ETF close (auto-adjusted)
  frequency: daily
  instrument_type: etf
  adjustment: auto_adjust

