# FX Carry signal — Milestones 5.5 + 5.7
#
# Cross-sectional carry across G10 currencies, anchored on USD.
# 7 currencies → 6 pairs after USD-anchoring (see DD-005).
#
# Rate series are referenced by catalogue variable name (DD-007). The
# catalogue resolves each name to the right source: DFF → FRED (daily),
# the others → FRED interbank rates (monthly). The runner is responsible
# for fetching each variable at the signal's frequency.

signal:
  name: fx_carry
  asset_class: fx
  signal_type: carry
  frequency: monthly

parameters:
  base_currency: USD
  lookback_smooth: 1
  n_long: 2
  n_short: 2
  # Currency code -> catalogue variable name. The signal's required_variables
  # list is derived from these values (deduplicated, sorted) at config-load time.
  rate_series:
    USD: DFF
    EUR: EUR_RATE
    GBP: GBP_RATE
    AUD: AUD_RATE
    NZD: NZD_RATE
    CAD: CAD_RATE
    JPY: JPY_RATE
    CHF: CHF_RATE

known_limitations:
  - "Carry computed from 3-month interbank rates, not actual forward points;
     a true carry signal uses forward-spot basis (covered-interest-parity-implied
     carry). Rate-differential proxy is the standard academic approximation."
  - "Non-USD FRED rate series are monthly frequency only. Daily rate data
     needed for daily carry rebalancing; Stage 2 / Phase 7.2 will introduce
     Bloomberg-sourced daily rates."
  - "No transaction costs or bid/ask spread modelled. Realistic FX carry
     after costs is materially lower than gross signal IC."
  - "Yahoo Finance FX data quality is approximate (mid-rate, no adjustments
     for weekend gaps or off-hours liquidity). Stage 2 / Phase 7.2 will move
     to higher-quality FX data."
